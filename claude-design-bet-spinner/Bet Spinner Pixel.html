<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BetSpinner — пиксельный (16-бит)</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="casino-spinner.js"></script>
<style>
  :root {
    --bg0: #050402; --bg1: #120c04;
    --ink: #F3E9CF; --muted: #A38C5E;
    --line: rgba(242,193,78,0.14);
    --gold: #F2C14E; --gold-deep: #B07E18;
    --mono: ui-monospace, 'SFMono-Regular', 'JetBrains Mono', Menlo, monospace;
    --sans: -apple-system, 'Segoe UI', system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font-family: var(--sans); color: var(--ink);
    background:
      radial-gradient(900px 560px at 50% -6%, rgba(242,193,78,0.16), transparent 60%),
      radial-gradient(820px 540px at 14% 110%, rgba(176,126,24,0.15), transparent 55%),
      linear-gradient(165deg, var(--bg1), var(--bg0) 72%);
    min-height: 100vh; -webkit-font-smoothing: antialiased;
    display: flex; align-items: center; justify-content: center; padding: 40px 24px;
  }
  .stack { width: 100%; max-width: 560px; display: flex; flex-direction: column; align-items: center; gap: 26px; }

  .head { text-align: center; }
  .eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold); margin: 0 0 10px; }
  h1 { font-size: clamp(26px, 5vw, 38px); margin: 0; line-height: 1.05; font-weight: 800;
       background: linear-gradient(180deg, #FFF0C0, #F2C14E 55%, #B07E18); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .sub { color: var(--muted); margin: 12px auto 0; font-size: 14px; line-height: 1.55; max-width: 44ch; }

  .stage {
    position: relative; width: min(380px, 80vw); aspect-ratio: 1/1;
    border-radius: 24px; display: grid; place-items: center;
    border: 1px solid var(--line);
  }
  .stage.dark { background: radial-gradient(120% 120% at 50% 42%, #1a1206, #070501); }
  .stage.checker {
    --c: rgba(255,255,255,0.05); background-color: #0a0703;
    background-image:
      linear-gradient(45deg, var(--c) 25%, transparent 25%), linear-gradient(-45deg, var(--c) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, var(--c) 75%), linear-gradient(-45deg, transparent 75%, var(--c) 75%);
    background-size: 26px 26px; background-position: 0 0, 0 13px, 13px -13px, -13px 0;
  }
  .stage.light { background: #efe6cf; }
  .stage canvas { width: 90%; height: 90%; display: block; image-rendering: pixelated; }

  .betbtn {
    display: inline-flex; align-items: center; gap: 12px; border: none; cursor: pointer;
    font: inherit; font-weight: 800; color: #2a1d02;
    background: linear-gradient(135deg, #FFE89A, var(--gold) 60%, var(--gold-deep));
    padding: 15px 30px; border-radius: 13px; font-size: 16px;
    box-shadow: 0 12px 30px rgba(242,193,78,0.30), inset 0 1px 0 rgba(255,255,255,0.5);
    transition: transform .15s ease;
  }
  .betbtn:hover { transform: translateY(-1px); }
  .betbtn.live { background: linear-gradient(135deg, #FFF3C0, #FFCF4A 50%, #C98E1C); }
  .dot { width: 9px; height: 9px; border-radius: 2px; background: #2a1d02; }
  .betbtn.live .dot { animation: blink 1s steps(2,start) infinite; }
  @keyframes blink { 50% { opacity: 0.2; } }
  .status { font-family: var(--mono); font-size: 12px; color: var(--muted); letter-spacing: .05em; }
  .status b { color: var(--gold); }
</style>
</head>
<body>
  <div id="root"></div>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" fill="#120c04"/>
      <g shape-rendering="crispEdges">
        <rect x="34" y="34" width="32" height="32" fill="#F2C14E"/>
        <rect x="42" y="42" width="6" height="6" fill="#3A2206"/>
        <rect x="54" y="54" width="6" height="6" fill="#3A2206"/>
      </g>
    </svg>
  </template>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "palette": ["#FBE07A", "#E3A92A", "#8F5E12", "#7BC62E"],
      "speed": 1,
      "pixelRes": 48,
      "backdrop": "dark"
    }/*EDITMODE-END*/;

    const PALETTES = [
      ["#FBE07A", "#E3A92A", "#8F5E12", "#7BC62E"],
      ["#FFE9A0", "#F2C14E", "#A8740F", "#5BA528"],
      ["#E9C96A", "#C49A2E", "#7A5410", "#3E8C2A"],
      ["#FFD24A", "#D9881A", "#7A4A0E", "#36C06A"]
    ];
    function mix(a, b, t) {
      const h = x => [parseInt(x.slice(1,3),16),parseInt(x.slice(3,5),16),parseInt(x.slice(5,7),16)];
      const A=h(a), B=h(b); return `rgb(${Math.round(A[0]+(B[0]-A[0])*t)},${Math.round(A[1]+(B[1]-A[1])*t)},${Math.round(A[2]+(B[2]-A[2])*t)})`;
    }
    function paletteToColors(p) {
      const [light, mid, dark, leaf] = p;
      return {
        dieLight: light, dieMid: mid, dieDark: dark, pip: '#3A2206',
        coinLight: light, coinMid: mid, coinDark: dark, coinRim: '#7A4F0E',
        leaf, leafMid: mix(leaf, '#1c5012', 0.45), leafDark: '#1c5012',
        glow: light, accent: mid
      };
    }

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [running, setRunning] = useState(false);
      const ref = useRef(null), inst = useRef(null);
      const colors = paletteToColors(t.palette);

      useEffect(() => {
        const s = new CasinoSpinner(ref.current, { style: 'pixel', colors, pixelRes: t.pixelRes, speed: t.speed });
        inst.current = s; return () => s.destroy();
      }, []);
      useEffect(() => { if (inst.current) inst.current.setColors(colors); }, [colors]);
      useEffect(() => { if (inst.current) inst.current.baseSpeed = t.speed; }, [t.speed]);
      useEffect(() => { if (inst.current) inst.current.pixelRes = t.pixelRes; }, [t.pixelRes]);
      useEffect(() => { if (inst.current) (running ? inst.current.start() : inst.current.stop()); }, [running]);

      return (
        <div className="stack">
          <div className="head">
            <p className="eyebrow">Pixel · 16-bit · прозрачный</p>
            <h1>Золотой кубик ставки</h1>
            <p className="sub">Пиксельная анимация в цветах сайта. Крутится, пока идёт ставка,
              и плавно замирает при результате. Прозрачный фон — ляжет на любую секцию.</p>
          </div>

          <div className={"stage " + t.backdrop}>
            <canvas ref={ref}></canvas>
          </div>

          <button className={"betbtn" + (running ? " live" : "")} onClick={() => setRunning(r => !r)}>
            <span className="dot"></span>{running ? "Остановить ставку" : "Сделать ставку"}
          </button>
          <div className="status">{running ? <span>статус: <b>идёт ставка…</b></span> : <span>статус: ожидание · нажмите кнопку</span>}</div>

          <TweaksPanel>
            <TweakSection label="Палитра (с сайта)" />
            <TweakColor label="Золото" value={t.palette} options={PALETTES} onChange={(v) => setTweak('palette', v)} />
            <TweakSection label="Пиксели и движение" />
            <TweakSlider label="Размер пикселя (крупнее ← → мельче)" value={t.pixelRes} min={32} max={120} step={4} onChange={(v) => setTweak('pixelRes', v)} />
            <TweakSlider label="Скорость" value={t.speed} min={0.4} max={2} step={0.1} onChange={(v) => setTweak('speed', v)} />
            <TweakSection label="Подложка (демо)" />
            <TweakRadio label="Фон" value={t.backdrop} options={['dark', 'checker', 'light']} onChange={(v) => setTweak('backdrop', v)} />
          </TweaksPanel>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
