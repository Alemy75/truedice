[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
fs_permissions = [{ access = "read-write", path = "./broadcast" }]
ffi = false

[profile.default.fuzz]
runs = 256
seed = "0xdeadbeef"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 11155111 }

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
